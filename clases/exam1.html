<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Examen 1: Fundamentos de Redes | CCNA Academy</title>
    <link rel="stylesheet" href="../assets/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&family=Share+Tech+Mono&family=Exo+2:wght@300;400;600&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ccna-overlay" id="ccnaOverlay" onclick="ccnaClose()"></div>
    <nav class="ccna-drawer" id="ccnaDrawer">
      <div class="drawer-header"><h2>◈ NAVEGACIÓN</h2><button class="drawer-close" onclick="ccnaClose()">✕</button></div>
      <div class="drawer-section">
        <div class="drawer-section-title">General</div>
        <a href="../index.html" class="drawer-link"><span class="dl-icon">🏠</span> Inicio</a>
        <a href="banco-preguntas.html" class="drawer-link"><span class="dl-icon">📝</span> Volver al Banco</a>
      </div>
    </nav>

    <header class="header-quiz">
        <div class="container">
            <button class="btn-menu" onclick="ccnaOpen()">☰</button>
            <h1>EXAMEN 1: FUNDAMENTOS DE REDES</h1>
            <p>Dominio 1.0 — CCNA 200-301 (50 Preguntas)</p>
        </div>
    </header>

    <main class="container quiz-container">
        <div id="quiz-form">
            <div id="questions-container"></div>
            
            <button type="button" class="btn-verify" onclick="verifyQuiz()">Finalizar y Calificar</button>
        </div>

        <div id="results" class="results-card" style="display:none;">
            <h2>RESULTADOS</h2>
            <div class="score-circle" id="score">0%</div>
            <p id="resultsText"></p>
            <button onclick="location.reload()" class="btn-retry">Reintentar Examen</button>
        </div>
    </main>

    <script src="../assets/main.js"></script>
    <script>
        const questions = [
            { q: "¿Cuál es la función principal de la capa de Red en el modelo OSI?", a: ["Enrutamiento de paquetes", "Entrega de datos proceso a proceso", "Control de errores de enlace", "Representación de datos"], c: 0 },
            { q: "¿Qué protocolo opera en la capa de transporte y es orientado a conexión?", a: ["UDP", "IP", "TCP", "ICMP"], c: 2 },
            { q: "¿Cuál es el propósito del protocolo ARP?", a: ["Asociar un nombre de dominio a una IP", "Asociar una dirección IP a una dirección MAC", "Asociar una MAC a un puerto de switch", "Transferir archivos de forma segura"], c: 1 },
            { q: "¿Qué tipo de cable se debe usar para conectar un switch a un router?", a: ["Cruzado (Crossover)", "Directo (Straight-through)", "Consola (Rollover)", "Serial"], c: 1 },
            { q: "¿Cuál es la máscara de subred por defecto para una dirección Clase B?", a: ["255.0.0.0", "255.255.255.0", "255.255.0.0", "255.255.255.252"], c: 2 },
            { q: "¿Qué dispositivo opera principalmente en la Capa 2 del modelo OSI?", a: ["Router", "Hub", "Switch", "Repetidor"], c: 2 },
            { q: "¿Cuál es la dirección de loopback estándar en IPv4?", a: ["192.168.1.1", "127.0.0.1", "10.0.0.1", "169.254.0.1"], c: 1 },
            { q: "¿Qué campo del encabezado IPv4 se utiliza para evitar bucles infinitos?", a: ["Checksum", "Flags", "Time to Live (TTL)", "Protocol"], c: 2 },
            { q: "¿Cuál es el tamaño (en bits) de una dirección IPv6?", a: ["32 bits", "48 bits", "64 bits", "128 bits"], c: 3 },
            { q: "¿Qué protocolo se utiliza para la configuración dinámica de direcciones IP?", a: ["DNS", "DHCP", "SNMP", "NTP"], c: 1 },
            // ... Aquí completarías las 50 preguntas siguiendo este patrón
        ];

        // Función para renderizar preguntas
        function loadQuestions() {
            const container = document.getElementById('questions-container');
            questions.forEach((item, index) => {
                const qDiv = document.createElement('div');
                qDiv.className = 'question-block';
                qDiv.innerHTML = `
                    <p class="question-text"><strong>${index + 1}.</strong> ${item.q}</p>
                    <div class="options-grid">
                        ${item.a.map((opt, i) => `
                            <label class="option-label">
                                <input type="radio" name="q${index}" value="${i}">
                                ${opt}
                            </label>
                        `).join('')}
                    </div>
                `;
                container.appendChild(qDiv);
            });
        }

        function verifyQuiz() {
            let correct = 0;
            questions.forEach((item, index) => {
                const selected = document.querySelector(`input[name="q${index}"]:checked`);
                const options = document.querySelectorAll(`input[name="q${index}"]`);
                
                options.forEach(opt => {
                    const label = opt.parentElement;
                    if (parseInt(opt.value) === item.c) {
                        label.style.borderColor = "#00d4aa";
                        label.style.background = "rgba(0,212,170,0.1)";
                    } else if (opt.checked) {
                        label.style.borderColor = "#ff4444";
                        label.style.background = "rgba(255,68,68,0.1)";
                    }
                });

                if (selected && parseInt(selected.value) === item.c) {
                    correct++;
                }
            });

            const score = Math.round((correct / questions.length) * 100);
            document.getElementById('score').textContent = score + "%";
            document.getElementById('resultsText').textContent = `Has respondido correctamente ${correct} de ${questions.length} preguntas.`;
            document.getElementById('results').style.display = 'block';
            window.scrollTo({ top: document.body.scrollHeight, behavior: 'smooth' });
        }

        window.onload = loadQuestions;
    </script>
</body>
</html>
